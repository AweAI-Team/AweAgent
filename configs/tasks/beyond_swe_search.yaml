# BeyondSWE Search Mode Configuration
# Usage:
#   awe-agent run -c configs/tasks/beyond_swe_search.yaml
#   python recipes/beyond_swe/run.py -c configs/tasks/beyond_swe_search.yaml --data-file ...

llm: "!include ../llm/azure.yaml"

runtime:
  backend: docker
  timeout: 14400
  resource_limits:
    cpu: "4"
    memory: "8Gi"

agent:
  type: search_swe
  max_steps: 200
  enable_search: true
  bash_timeout: 1200

task:
  type: beyond_swe
  dataset_id: beyond_swe
  data_file: ${DATA_FILE}

eval:
  enabled: true
  timeout: 3600

execution:
  max_concurrent: 50
  max_retries: 3
  output_path: ./results/beyond_swe_search

security:
  bash_blocklist:
    - ".*git clone.*"
    - ".*git fetch.*"
    - ".*git pull.*"
    - ".*curl.*github\\.com.*"
    - ".*wget.*github\\.com.*"
